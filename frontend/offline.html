<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHAI — Offline</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--accent:#00c8ff;--accent2:#00ff9d;--dim:#4a5a7a;--text:#c8d8f0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;background-image:radial-gradient(ellipse at 50% 0%,rgba(0,200,255,.07) 0%,transparent 60%);}
.emblem{width:80px;height:80px;border:3px solid var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:0 0 24px rgba(0,200,255,.2);animation:glow 2s infinite;}
@keyframes glow{0%,100%{box-shadow:0 0 24px rgba(0,200,255,.2)}50%{box-shadow:0 0 40px rgba(0,200,255,.4)}}
.emblem span{font-family:'Share Tech Mono',monospace;font-size:20px;font-weight:700;color:var(--accent);}
h1{font-size:28px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#fff;margin-bottom:8px;}
.sub{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--dim);letter-spacing:2px;margin-bottom:32px;}
.status-box{background:rgba(15,22,40,.8);border:1px solid rgba(30,45,80,.8);border-radius:4px;padding:20px 28px;margin-bottom:28px;max-width:380px;}
.status-box p{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--accent);letter-spacing:1px;line-height:1.8;}
.btn{padding:12px 32px;background:linear-gradient(135deg,#00c8ff,#0070b0);color:#0a0e1a;border:none;border-radius:3px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);}
.btn:hover{filter:brightness(1.15);}
#netStatus{margin-top:16px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dim);}
</style>
</head>
<body>
<div class="emblem"><span>NH</span></div>
<h1>You're Offline</h1>
<p class="sub">NHAI AUTHENTICATION SYSTEM</p>
<div class="status-box">
  <p>
    No internet connection detected.<br><br>
    The app is cached and will work once<br>
    the NHAI server is reachable on your<br>
    local network.
  </p>
</div>
<button class="btn" onclick="location.reload()">↺ RETRY CONNECTION</button>
<p id="netStatus">Checking network status...</p>
<script>
function checkNet(){
  const el=document.getElementById("netStatus");
  if(navigator.onLine){el.textContent="Network available — server may still be unreachable";el.style.color="#ffb300";}
  else{el.textContent="No network detected";el.style.color="#ff3d5a";}
}
window.addEventListener("online", ()=>location.reload());
window.addEventListener("offline", checkNet);
checkNet();
</script>
</body>
</html>
